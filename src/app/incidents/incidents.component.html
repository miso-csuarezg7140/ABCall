<div class="container mx-auto p-6">

    <!-- Título -->
    <h1 class="text-3xl font-semibold mb-6">Incidentes</h1>

    <!-- Barra de búsqueda -->
    <div class="mb-6 flex items-center border border-gray-300 rounded-md p-2">
        <input type="text" placeholder="Buscar incidentes..." class="w-full p-2 rounded-md text-gray-700 outline-none">
        <button class="p-2 text-gray-500">
            <i class="fas fa-search"></i> <!-- Icono de lupa -->
        </button>
    </div>

    <!-- Tabs -->
    <div class="mb-6 flex space-x-4">
        <button class="py-2 px-4 rounded-md font-medium text-lg bg-blue-500 text-white"
            [class.bg-gray-300]="!tabActive">
            Pendientes
        </button>
        <button class="py-2 px-4 rounded-md font-medium text-lg text-gray-500 cursor-not-allowed"
            [class.bg-gray-300]="tabDisabled" disabled>
            Resueltos
        </button>
    </div>

    <!-- Cards -->
    <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-6">
        <div class="card bg-white shadow-lg rounded-lg overflow-hidden">
            <img class="w-full h-48 object-cover" src="https://via.placeholder.com/300" alt="Incident Image">
            <div class="p-4">
                <h3 class="font-semibold text-lg">Incidente 1</h3>
                <p class="text-gray-600 mt-2">Descripción del incidente pendiente...</p>
            </div>
        </div>

        <div class="card bg-white shadow-lg rounded-lg overflow-hidden">
            <img class="w-full h-48 object-cover" src="https://via.placeholder.com/300" alt="Incident Image">
            <div class="p-4">
                <h3 class="font-semibold text-lg">Incidente 2</h3>
                <p class="text-gray-600 mt-2">Descripción del incidente resuelto...</p>
            </div>
        </div>

    </div>
</div>
